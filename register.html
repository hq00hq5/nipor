<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
  <meta name="description" content="نيپور — الوسيط الرقمي الفاخر. سجّل دخولك واستمتع بتجربة فريدة."/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#060608"/>
  <title>نيپور | مرحبا بك</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="css/welcome.css"/>
</head>
<body>

<!-- ═══ ANIMATED BACKGROUND LAYERS ═══ -->
<div class="bg-base"></div>
<canvas id="cuneiform-canvas"></canvas>
<div class="bg-glow bg-glow--top"></div>
<div class="bg-glow bg-glow--bottom"></div>
<div class="bg-noise"></div>
<div class="bg-vignette"></div>

<!-- ═══ FLOATING CUNEIFORM CHARACTERS ═══ -->
<div class="floating-glyphs" id="floating-glyphs" aria-hidden="true"></div>

<!-- ═══ MAIN CONTAINER ═══ -->
<main class="login-main" id="login-main">

  <!-- ── Brand Header ── -->
  <header class="brand" id="brand">
    <div class="brand-lamassu">
      <svg class="lamassu-svg" viewBox="0 0 120 120" fill="none">
        <circle cx="60" cy="60" r="56" stroke="url(#gold-ring)" stroke-width="1.5" opacity="0.4"/>
        <circle cx="60" cy="60" r="48" stroke="url(#gold-ring)" stroke-width="0.8" opacity="0.2"/>
        <defs><linearGradient id="gold-ring" x1="0" y1="0" x2="120" y2="120"><stop stop-color="#D4AF37"/><stop offset="1" stop-color="#E8C547"/></linearGradient></defs>
      </svg>
      <span class="lamassu-glyph">&#x12000;</span>
    </div>
    <h1 class="brand-name">نيپور</h1>
    <p class="brand-tagline">الوسيط الرقمي الفاخر</p>
    <div class="brand-line"></div>
  </header>

  <!-- ── Glassmorphic Auth Card ── -->
  <section class="glass-card" id="glass-card">
    <div class="glass-card-glow"></div>

    <h2 style="color:var(--gold);text-align:center;margin-bottom:24px;font-size:1.4rem;">إنشاء حساب جديد</h2>

    <!-- Register Form -->
    <form class="auth-form" id="form-register" autocomplete="off">
      <div class="field">
        <input class="field-input" id="input-name" type="text" placeholder="الاسم الكامل" autocomplete="name"/>
      </div>
      <div class="field">
        <input class="field-input" id="input-email" type="email" placeholder="البريد الإلكتروني" autocomplete="email"/>
      </div>
      <div class="field">
        <input class="field-input" id="input-pass" type="password" placeholder="كلمة المرور"/>
        <button class="field-toggle" id="pass-toggle" type="button"><i class="fa-solid fa-eye"></i></button>
      </div>
      <div class="field">
        <input class="field-input" id="input-pass-conf" type="password" placeholder="تأكيد كلمة المرور"/>
        <button class="field-toggle" id="pass-conf-toggle" type="button"><i class="fa-solid fa-eye"></i></button>
      </div>
      <div id="register-error" class="auth-error"></div>
      <div id="password-hint" style="color:var(--txt3);font-size:0.8rem;text-align:right;margin-top:-10px;display:none;">يجب أن تحتوي كلمة المرور على 8 أحرف، حرف كبير، رقم، ورمز خاص (@#$).</div>
      <button class="btn-gold" type="submit" id="btn-register-submit">
        <span class="btn-gold-text">إنشاء الحساب</span>
        <span class="btn-gold-shine"></span>
        <i class="fa-solid fa-user-plus btn-gold-arrow" id="btn-register-icon"></i>
        <i class="fa-solid fa-circle-notch fa-spin btn-gold-spinner" id="btn-register-spinner" style="display:none;"></i>
      </button>
    </form>

    <!-- Divider -->
    <div class="divider"><span>أو</span></div>

    <!-- Login Link -->
    <button class="btn-outline" id="btn-login-link" onclick="window.location.href='index.html'">
      <i class="fa-solid fa-right-to-bracket"></i>
      <span>تسجيل الدخول</span>
    </button>
  </section>

  <!-- Footer -->
  <footer class="login-footer" id="login-footer">
    <span>&copy; 2025 نيپور — جميع الحقوق محفوظة</span>
  </footer>
</main>

<!-- ═══ GOLD SUCCESS MODAL ═══ -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-card" id="modal-card">
    <div class="modal-particles" id="modal-particles"></div>
    <div class="modal-icon"><i class="fa-solid fa-check"></i></div>
    <h2 class="modal-title" id="modal-title">مرحبا بك في نيپور</h2>
    <p class="modal-desc" id="modal-desc">جاري إنشاء حسابك...</p>
    <div class="modal-bar"><div class="modal-bar-fill"></div></div>
  </div>
</div>

<script type="module" src="js/register.js"></script>
</body>
</html>
